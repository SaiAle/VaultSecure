apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultsecure-backend
  namespace: vaultsecure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vaultsecure-backend
  template:
    metadata:
      labels:
        app: vaultsecure-backend
    spec:
      containers:
        - name: backend
          image: vaultsecure-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: vaultsecure-secrets
                  key: db-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vaultsecure-secrets
                  key: jwt-secret
            - name: MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultsecure-secrets
                  key: master-password
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vaultsecure-backend
  namespace: vaultsecure
spec:
  selector:
    app: vaultsecure-backend
  ports:
    - port: 8080
      targetPort: 8080
