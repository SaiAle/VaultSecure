server:
  port: 8080

spring:
  application:
    name: vaultsecure
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultsecure}
    username: ${DB_USER:vault}
    password: ${DB_PASS:vaultpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

vault:
  jwt:
    secret: ${JWT_SECRET:vaultsecure-super-secret-key-32-chars!!}
    expiry-ms: 3600000
  master-password: ${MASTER_PASSWORD:ch4ng3-m3-in-pr0duction!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.vaultsecure: DEBUG
