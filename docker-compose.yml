version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vaultsecure
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vaultpass
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d vaultsecure"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vaultsecure
      DB_USER: vault
      DB_PASS: vaultpass
      REDIS_HOST: redis
      JWT_SECRET: change-me-in-production-32chars!!
      MASTER_PASSWORD: ch4ng3-m3-in-pr0duction!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]

volumes:
  pgdata:
  redisdata:
